<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stock Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div id="sidebar">
    <h2>📈 Companies</h2>
    <input type="text" id="search" placeholder="Search..." onkeyup="filterList()">
    <div id="company-list"></div>
  </div>

  <div id="main">
    <div id="movers-section" style="margin-bottom: 25px;">
  <div style="display: flex; gap: 15px;">
    
    <div style="flex: 1; background: #1e293b; border-radius: 10px; padding: 15px;">
      <h3 style="color: #22c55e; margin-bottom: 10px;">🚀 Top Gainers</h3>
      <div id="gainers-list"></div>
    </div>

    <div style="flex: 1; background: #1e293b; border-radius: 10px; padding: 15px;">
      <h3 style="color: #ef4444; margin-bottom: 10px;">📉 Top Losers</h3>
      <div id="losers-list"></div>
    </div>

  </div>
</div>

    <div id="stock-title">Select a company →</div>

    <div id="summary-cards">
      <div class="card"><h4>52W High</h4><p id="high">—</p></div>
      <div class="card"><h4>52W Low</h4><p id="low">—</p></div>
      <div class="card"><h4>Avg Close</h4><p id="avg">—</p></div>
    </div>

    <div id="chart-container">
      <canvas id="myChart"></canvas>
    </div>
  </div>

  <script src="/static/index.js"></script>

</body>
</html>
